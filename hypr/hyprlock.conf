

# BACKGROUND
background {
    monitor =
    #path = screenshot
    path = ~/.config/hypr/hyprlock/hyprlock.jpg
    # color = $background
    blur_passes = 2
    contrast = 1
    brightness = 0.5
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# GENERAL
general {
    no_fade_in = true
    no_fade_out = true
    hide_cursor = false
    grace = 0
    disable_loading_bar = true
}

# DATE
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %B %d")"
  color = rgb(205, 214, 244)
  font_size = 22
  font_family = JetBrains Mono
  position = 0, 200
  halign = center
  valign = center
}

# TIME
label {
  monitor = 
  text = cmd[update:1000] echo "$(date +"%-I:%M %p")"
  color = rgb(205, 214, 244)
  font_size = 95
  font_family = JetBrains Mono Extrabold
  position = 0, 100
  halign = center
  valign = center
}


# INPUT FIELD
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.35 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgb(205, 214, 244)
    inner_color = rgba(0, 0, 0, 0.2)
    font_color = rgb(205, 214, 244)
    fade_on_empty = false
    rounding = -1
    check_color = rgb(204, 136, 34)
    placeholder_text = <i><span foreground="##cdd6f4">Input Password...</span></i>
    hide_input = false
    position = 0, -200
    halign = center
    valign = center
}


label {
    monitor = 
    size = 70, 35
    text = cmd[update:60000] echo "$LAYOUT"
    halign = right
    color = rgb(205, 214, 244)
    valign = bottom
    position = -30, 30
}

# USER GRETTING MESSAGE
label {
    monitor =
    text = cmd[update:60000] echo "Hi there, $USER"
    color = rgb(205, 214, 244)
    font_size = 22
    font_family = JetBrains Mono bold
    position = 0, -100
    halign = center
    valign = center
}

# SYSTEM UPTIME
label {
    monitor =
    text = cmd[update:60000] echo "󰔚   Up: $(uptime -p | sed 's/up //')"
    color = rgb(205, 214, 244)
    font_size = 12
    font_family = SF Pro Display Bold
    position = 30, 30
    halign = left
    valign = bottom
}